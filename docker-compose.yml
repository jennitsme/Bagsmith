services:
  postgres:
    image: postgres:16-alpine
    container_name: bagsmith-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bagsmith
    ports:
      - "5433:5432"
    volumes:
      - bagsmith_pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: bagsmith-redis
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  bagsmith_pgdata:
