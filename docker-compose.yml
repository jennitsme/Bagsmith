version: '3.9'
services:
  postgres:
    image: postgres:16-alpine
    container_name: bagsmith-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: bagsmith
    ports:
      - "5432:5432"
    volumes:
      - bagsmith_pgdata:/var/lib/postgresql/data

volumes:
  bagsmith_pgdata:
